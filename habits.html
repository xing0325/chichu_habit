<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>chichu's habit map</title>
<style>
  :root {
    --bg: #fafaf9;
    --surface: #ffffff;
    --surface-2: #f5f5f4;
    --border: #e7e5e4;
    --ink: #1c1917;
    --ink-soft: #57534e;
    --ink-muted: #a8a29e;
    --shadow: 0 1px 2px rgba(0,0,0,.04), 0 4px 12px rgba(0,0,0,.04);
    --shadow-hover: 0 1px 2px rgba(0,0,0,.06), 0 12px 32px rgba(0,0,0,.08);

    --c-workflow: #10b981;
    --c-format:   #3b82f6;
    --c-project:  #ef4444;
    --c-hardware: #f59e0b;
    --c-tools:    #64748b;
    --c-visual:   #ec4899;
    --c-decisions:#8b5cf6;
    --c-writing:  #14b8a6;
  }
  [data-theme="dark"] {
    --bg: #0c0a09;
    --surface: #1c1917;
    --surface-2: #292524;
    --border: #44403c;
    --ink: #fafaf9;
    --ink-soft: #d6d3d1;
    --ink-muted: #78716c;
    --shadow: 0 1px 2px rgba(0,0,0,.4), 0 4px 12px rgba(0,0,0,.3);
    --shadow-hover: 0 1px 2px rgba(0,0,0,.5), 0 12px 32px rgba(0,0,0,.5);
  }

  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    line-height: 1.6;
    padding: 32px 24px 80px;
    transition: background .2s, color .2s;
  }
  .container { max-width: 1280px; margin: 0 auto; }

  /* Header */
  .header { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: flex-start; gap: 16px; margin-bottom: 32px; }
  .header h1 { margin: 0 0 8px; font-size: 32px; font-weight: 700; letter-spacing: -0.02em; }
  .header .subtitle { margin: 0; color: var(--ink-soft); font-size: 14px; }
  .header .subtitle code { background: var(--surface-2); padding: 2px 6px; border-radius: 4px; font-size: 13px; }
  .header .subtitle a { color: var(--ink); text-decoration: none; border-bottom: 1px dotted var(--ink-muted); }
  .header .subtitle a:hover { color: var(--c-format); border-bottom-color: var(--c-format); }
  #theme-toggle {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--ink);
    width: 40px; height: 40px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 18px;
    transition: background .2s, transform .15s;
  }
  #theme-toggle:hover { background: var(--surface-2); transform: scale(1.05); }

  /* Section title */
  .section-title {
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--ink-muted);
    font-weight: 600;
    margin: 0 0 16px;
  }

  /* Category chart */
  .overview { margin-bottom: 32px; }
  .chart {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 24px;
    box-shadow: var(--shadow);
  }
  .chart-row {
    display: grid;
    grid-template-columns: 160px 1fr 48px;
    align-items: center;
    gap: 16px;
    padding: 6px 0;
    cursor: pointer;
    border-radius: 6px;
    padding-left: 8px;
    margin-left: -8px;
    transition: background .15s;
  }
  .chart-row:hover { background: var(--surface-2); }
  .chart-row.active { background: var(--surface-2); }
  .chart-label { display: flex; align-items: center; gap: 8px; font-size: 14px; color: var(--ink-soft); }
  .chart-label .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .chart-bar-wrap { background: var(--surface-2); height: 8px; border-radius: 4px; overflow: hidden; }
  .chart-bar { height: 100%; border-radius: 4px; transition: width .4s ease; }
  .chart-count { text-align: right; font-variant-numeric: tabular-nums; font-size: 14px; color: var(--ink-soft); font-weight: 500; }

  /* Controls */
  .controls { display: flex; flex-wrap: wrap; gap: 16px; align-items: center; margin-bottom: 24px; }
  #search {
    flex: 1; min-width: 240px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--ink);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 14px;
    font-family: inherit;
    transition: border-color .15s, box-shadow .15s;
  }
  #search:focus { outline: none; border-color: var(--c-format); box-shadow: 0 0 0 3px rgba(59,130,246,.15); }
  .chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--ink-soft);
    border-radius: 999px;
    padding: 6px 14px;
    font-size: 13px;
    cursor: pointer;
    user-select: none;
    transition: all .15s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .chip:hover { border-color: var(--ink-soft); color: var(--ink); }
  .chip.active { background: var(--ink); color: var(--bg); border-color: var(--ink); }
  .chip .dot { width: 8px; height: 8px; border-radius: 50%; }

  /* Card grid */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 16px;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    box-shadow: var(--shadow);
    transition: transform .15s, box-shadow .15s, border-color .15s;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .card::before {
    content: "";
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 4px;
    background: var(--card-color, var(--ink-muted));
  }
  .card:hover { transform: translateY(-2px); box-shadow: var(--shadow-hover); border-color: var(--card-color, var(--ink-soft)); }
  .card-cat {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--card-color, var(--ink-soft));
    font-weight: 600;
  }
  .card h3 { margin: 0; font-size: 16px; font-weight: 600; color: var(--ink); line-height: 1.4; }
  .card p { margin: 0; font-size: 13px; color: var(--ink-soft); line-height: 1.6; flex: 1; }
  .card-footer {
    display: flex; align-items: center; justify-content: space-between;
    font-size: 11px;
    color: var(--ink-muted);
    padding-top: 8px;
    border-top: 1px dashed var(--border);
    gap: 8px;
  }
  .card-file { font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .card-link {
    color: var(--c-format);
    text-decoration: none;
    border: 1px solid var(--border);
    padding: 3px 8px;
    border-radius: 4px;
    flex-shrink: 0;
    transition: all .15s;
  }
  .card-link:hover { background: var(--c-format); color: #fff; border-color: var(--c-format); }
  .card-badge {
    background: var(--surface-2);
    color: var(--ink-muted);
    padding: 3px 8px;
    border-radius: 4px;
    font-size: 11px;
    flex-shrink: 0;
  }

  /* Footer notes */
  .footer-notes {
    margin-top: 48px;
    padding: 20px;
    background: var(--surface-2);
    border-radius: 12px;
    font-size: 13px;
    color: var(--ink-soft);
  }
  .footer-notes h2 { font-size: 13px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--ink-muted); font-weight: 600; margin: 0 0 12px; }
  .footer-notes ul { margin: 0; padding-left: 20px; }
  .footer-notes li { margin: 6px 0; }
  .footer-notes code { background: var(--surface); padding: 2px 6px; border-radius: 4px; }
  .footer-notes a { color: var(--ink); border-bottom: 1px dotted var(--ink-muted); text-decoration: none; }

  /* Empty state */
  .empty-state {
    grid-column: 1 / -1;
    text-align: center;
    padding: 48px 20px;
    color: var(--ink-muted);
    font-size: 14px;
  }

  /* Hide cards when filtered out */
  .card.hidden { display: none; }

  /* SVG icons */
  .icon { width: 14px; height: 14px; vertical-align: -2px; }
</style>
</head>

<div class="container">

  <header class="header">
    <div>
      <h1>chichu's habit map</h1>

        <code>~/.claude/memory</code> +

</div>

const state = { activeCat: "all", search: "" };

function countByCat() {
  const counts = {};
  for (const k of Object.keys(CATEGORIES)) counts[k] = 0;
  for (const h of habits) counts[h.cat] = (counts[h.cat] || 0) + 1;
  return counts;
}

function renderChart() {
  const counts = countByCat();
  const max = Math.max(...Object.values(counts));
  const chart = document.getElementById('chart');
  chart.innerHTML = '';
  const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);
  for (const [key, count] of sorted) {
    const cat = CATEGORIES[key];
    const row = document.createElement('div');
    row.className = 'chart-row';
    row.dataset.cat = key;
    row.innerHTML = `
      <div class="chart-label"><span class="dot" style="background:${cat.color}"></span>${cat.label}</div>
      <div class="chart-bar-wrap"><div class="chart-bar" style="width:${(count/max)*100}%; background:${cat.color}"></div></div>
      <div class="chart-count">${count}</div>
    `;
    row.addEventListener('click', () => setCategory(key === state.activeCat ? "all" : key));
    chart.appendChild(row);
  }
  // mark active
  if (state.activeCat !== "all") {
    chart.querySelectorAll('.chart-row').forEach(r => {
      r.classList.toggle('active', r.dataset.cat === state.activeCat);
    });
  }
}

function renderChips() {
  const chips = document.getElementById('chips');
  chips.innerHTML = '';
  const all = document.createElement('button');
  all.className = 'chip' + (state.activeCat === "all" ? " active" : "");
  all.textContent = `全部 (${habits.length})`;
  all.addEventListener('click', () => setCategory("all"));
  chips.appendChild(all);
  const counts = countByCat();
  for (const [key, cat] of Object.entries(CATEGORIES)) {
    if (!counts[key]) continue;
    const btn = document.createElement('button');
    btn.className = 'chip' + (state.activeCat === key ? " active" : "");
    btn.innerHTML = `<span class="dot" style="background:${cat.color}"></span>${cat.label} (${counts[key]})`;
    btn.addEventListener('click', () => setCategory(key === state.activeCat ? "all" : key));
    chips.appendChild(btn);
  }
}

function renderCards() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  const q = state.search.trim().toLowerCase();
  let visible = 0;
  for (const h of habits) {
    const matchCat = state.activeCat === "all" || h.cat === state.activeCat;
    const matchQ = !q || h.title.toLowerCase().includes(q) || h.desc.toLowerCase().includes(q);
    if (!matchCat || !matchQ) continue;
    visible++;
    const cat = CATEGORIES[h.cat];
    const card = document.createElement('article');
    card.className = 'card';
    card.style.setProperty('--card-color', cat.color);
    const repoLink = h.repo
      ? `<a class="card-link" href="${REPO_BASE}${h.repo}" target="_blank" rel="noopener">仓库 →</a>`
      : `<span class="card-badge">${h.badge || '本地'}</span>`;
    card.innerHTML = `
      <div class="card-cat">${cat.label}</div>
      <h3>${h.title}</h3>
      <p>${h.desc}</p>
      <div class="card-footer">
        <span class="card-file" title="${h.file}">${h.file}</span>
        ${repoLink}
      </div>
    `;
    grid.appendChild(card);
  }
  if (visible === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    empty.textContent = '没有匹配项。换个关键词或清掉过滤试试。';
    grid.appendChild(empty);
  }
}

function setCategory(key) {
  state.activeCat = key;
  renderChart();
  renderChips();
  renderCards();
}

function setSearch(val) {
  state.search = val;
  renderCards();
}

// Theme toggle
const themeToggle = document.getElementById('theme-toggle');
function applyTheme(theme) {
  if (theme === 'dark') {
    document.documentElement.setAttribute('data-theme', 'dark');
    themeToggle.textContent = '○';
  } else {
    document.documentElement.removeAttribute('data-theme');
    themeToggle.textContent = '●';
  }
  localStorage.setItem('habit-theme', theme);
}
const savedTheme = localStorage.getItem('habit-theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
applyTheme(savedTheme);
themeToggle.addEventListener('click', () => {
  applyTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
});

// Search
document.getElementById('search').addEventListener('input', e => setSearch(e.target.value));

// Init
document.getElementById('total-count').textContent = habits.length;
document.getElementById('cat-count').textContent = Object.keys(CATEGORIES).length;
renderChart();
renderChips();
renderCards();
</script>
</body>
</html>
